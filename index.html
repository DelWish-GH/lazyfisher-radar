<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LazyFisher 雷达监控器 V12 (动态几率修復版)</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎣</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #f4f7f6; --sidebar: #2c3e50; --primary: #1abc9c;
    --accent: #2196f3; --text: #2c3e50; --muted: #7f8c8d;
  }

  body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; display: flex; }

  /* 🏢 四栏式主工作区 */
  #col-nav { width: 220px; background: var(--sidebar); display: flex; flex-direction: column; z-index: 5; box-shadow: 2px 0 5px rgba(0,0,0,0.1); flex-shrink: 0;}
  #col-filters { width: 240px; background: #fff; display: flex; flex-direction: column; border-right: 1px solid #e2e8f0; z-index: 4; flex-shrink: 0;}
  #col-list { width: 340px; background: #fdfdfd; display: flex; flex-direction: column; border-right: 1px solid #e2e8f0; z-index: 3; flex-shrink: 0;}
  #col-chart { flex: 1; background: white; display: flex; justify-content: center; align-items: center; padding: 15px; position: relative; min-width: 0;}

  /* 👈 第一栏: 钓场导航 */
  #sidebar-content { flex-grow: 1; overflow-y: auto; }
  #sidebar-content::-webkit-scrollbar { width: 4px; }
  #sidebar-content::-webkit-scrollbar-thumb { background: #4a6984; }
  .section-title { background: #233142; padding: 10px 12px; font-size: 11px; color: #a4b0be; font-weight: bold; position: sticky; top: 0; z-index: 2;}
  .tab { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #34495e; font-size: 13px; color: #ecf0f1; transition: 0.2s; display: flex; justify-content: space-between; align-items: center;}
  .tab:hover, .tab.active { background: var(--primary); font-weight: bold; border-left: 4px solid #f1c40f; padding-left: 8px;}
  
  /* 左侧底部折叠面板共用样式 */
  .nav-details { background: #1a252f; color: #ecf0f1; border-top: 1px solid #000; flex-shrink: 0;}
  .nav-details summary { padding: 10px 12px; cursor: pointer; font-size: 12px; font-weight: bold; outline: none; list-style: none; display: flex; align-items: center;}
  .nav-details summary::-webkit-details-marker { display: none; }
  .nav-details summary:hover { background: #233142; }
  .nav-details-content { padding: 12px; padding-top: 5px; }

  /* ⏸️ 第二栏: 上下文与过滤器 */
  #spot-context-panel { padding: 12px; background: #e8f4f8; border-bottom: 3px solid var(--accent); display: none; flex-shrink: 0;}
  #spot-title { font-size: 14px; font-weight: bold; margin-bottom: 8px; color: var(--text); }
  .slot-btn { display: inline-block; padding: 3px 8px; margin: 0 4px 6px 0; border: 1px solid #bdc3c7; border-radius: 12px; font-size: 11px; cursor: pointer; background: white; color: var(--muted); font-weight: bold;}
  .slot-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .vert-depth-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; padding: 5px 0; border-bottom: 1px dashed #ccc;}
  .badge { padding: 2px 6px; border-radius: 8px; color: white; font-weight: bold; font-size: 10px; }
  .b-up { background: #64b5f6; } .b-mid { background: #2196f3; } .b-down { background: #0d47a1; }
  
  #filters-container { padding: 12px; overflow-y: auto; flex-grow: 1; }
  .filter-group { margin-bottom: 10px; }
  .filter-title { font-size: 12px; font-weight: bold; color: var(--muted); display: block; margin-bottom: 6px; }
  .filter-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .filter-tags label { font-size: 11px; cursor: pointer; background: #eee; padding: 4px 8px; border-radius: 12px; user-select: none; border: 1px solid transparent;}
  .filter-tags input { display: none; }
  .filter-tags label:has(input:checked) { background: var(--primary); color: white; font-weight: bold; }

  /* 🐟 第三栏: 鱼类独立列表 */
  #search-box { padding: 12px; background: white; border-bottom: 1px solid #eee; z-index: 2;}
  #search-input { width: 100%; padding: 8px; border: 2px solid #bdc3c7; border-radius: 6px; box-sizing: border-box; font-size: 13px; outline: none; margin-bottom: 8px;}
  #search-input:focus { border-color: var(--primary); }
  
  /* 🌟 工具列排版 */
  .toolbar-row { display: flex; gap: 6px; align-items: center; }
  .toolbar-select { flex: 1; padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 12px; outline: none; background: #f8fafc; color: #334155; }
  .toolbar-select:focus { border-color: var(--primary); }
  #clear-btn { padding: 6px 12px; background: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap;}
  #clear-btn:hover { background: #cbd5e1; color: #1e293b; }

  #fish-list-container { flex-grow: 1; overflow-y: auto; padding: 10px; background: #f8fafc;}
  #fish-list-container::-webkit-scrollbar { width: 6px; }
  #fish-list-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  .fish-item { padding: 10px; border: 1px solid #edf2f7; border-radius: 6px; margin-bottom: 8px; display: flex; align-items: flex-start; cursor: pointer; background: #fff;}
  .fish-item:hover { border-color: #a0aec0; }
  .fish-item input { margin-right: 8px; margin-top: 2px; transform: scale(1.2); accent-color: var(--primary);}
  .fish-info { flex: 1; min-width: 0; }
  .f-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .f-name { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display:flex; align-items:center; gap:6px;}
  .f-meta { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 600;}
  
  /* 🎯 第四栏: 雷达图 */
  canvas { max-width: 100%; max-height: 100%; object-fit: contain; }

  /* 标签颜色 */
  .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-right: 4px; color: white; font-weight: bold; display: inline-block;}
  .tag.rarity-常见 { background: #a4b0be; } .tag.rarity-少见 { background: #2ed573; }
  .tag.rarity-稀有 { background: #ffa502; } .tag.rarity-罕见 { background: #9b59b6; } .tag.rarity-传奇 { background: #ff4757; }
</style>
</head>
<body>

<div id="col-nav">
  <div id="sidebar-content"></div>
  
  <details class="nav-details" id="guild-details">
    <summary style="color: #f39c12;">📜 协会委托贴板</summary>
    <div class="nav-details-content">
      <textarea id="guild-input" style="width:100%; height:80px; padding:6px; border:1px solid #34495e; border-radius:4px; box-sizing:border-box; font-size:10px; resize:none; background:#2c3e50; color:white; font-family:monospace;" oninput="parseGuildTasks(this.value)" placeholder="贴上任务 JSON..."></textarea>
      <div style="text-align:right; margin-top:6px;">
        <button style="background:#e74c3c; color:white; border:none; padding:4px 10px; border-radius:3px; cursor:pointer; font-weight:bold; font-size:11px;" onclick="document.getElementById('guild-input').value=''; parseGuildTasks('');">清空任务</button>
      </div>
    </div>
  </details>

  <details class="nav-details" id="time-details">
    <summary style="color: #1abc9c;">⏳ 现实与系统时间</summary>
    <div class="nav-details-content">
      <div class="side-calc-row"><span>现实时间:</span><strong id="real-time" style="color:#1abc9c;">00:00</strong></div>
      <div class="side-calc-row"><span>游戏指针:</span><strong id="game-time" style="color:#ff4757;">00:00</strong></div>
      <div class="side-calc-row" style="margin-top:8px;">
        <input type="number" id="calib-h" class="side-calc-input" min="0" max="23" placeholder="时" style="width:40px;">
        <button onclick="calibTime()" style="background:var(--primary); color:white; border:none; padding:3px 8px; border-radius:3px; cursor:pointer; font-weight:bold; font-size:11px;">校准</button>
      </div>
    </div>
  </details>
</div>

<div id="col-filters">
  <div id="spot-context-panel">
    <div id="spot-title">📍 未知钓场</div>
    <div id="slot-buttons-container" style="margin-bottom:8px;"></div>
    <div id="depth-indicator"></div>
  </div>
  <div id="filters-container">
    <div class="filter-group">
      <span class="filter-title">🏊 泳层:</span>
      <div class="filter-tags" id="tags-layer">
        <label><input type="checkbox" value="上层">上层</label>
        <label><input type="checkbox" value="中层">中层</label>
        <label><input type="checkbox" value="下层">下层</label>
      </div>
    </div>
    <div class="filter-group"><span class="filter-title">🐛 活饵:</span><div class="filter-tags" id="tags-bait"></div></div>
    <div class="filter-group"><span class="filter-title">🐟 拟饵:</span><div class="filter-tags" id="tags-lure"></div></div>
	<div class="filter-group" style="margin-top: 15px; border-top: 1px dashed #cbd5e1; padding-top: 10px;">
      <span class="filter-title">⏱️ 擬餌黃金收線速度基準:</span>
      <div style="font-size: 11px; line-height: 2.0; color: var(--text); background: #f8fafc; padding: 8px 10px; border-radius: 6px; border: 1px solid #edf2f7; margin-top: 6px;">
        <div style="display:flex; justify-content:space-between; border-bottom: 1px dashed #e2e8f0; padding-bottom: 2px;"><span>💧 水面系 (浅层匀速)</span><strong style="color:#ff4757; font-family:monospace;">1.70 m/s</strong></div>
        <div style="display:flex; justify-content:space-between; border-bottom: 1px dashed #e2e8f0; padding: 2px 0;"><span>🐟 米诺 (中层抽动)</span><strong style="color:#2196f3; font-family:monospace;">1.38 m/s</strong></div>
        <div style="display:flex; justify-content:space-between; border-bottom: 1px dashed #e2e8f0; padding: 2px 0;"><span>✨ 亮片 (中层匀速)</span><strong style="color:#ffa502; font-family:monospace;">1.20 m/s</strong></div>
        <div style="display:flex; justify-content:space-between; border-bottom: 1px dashed #e2e8f0; padding: 2px 0;"><span>📦 摇滚 (中层匀速)</span><strong style="color:#2ed573; font-family:monospace;">1.16 m/s</strong></div>
        <div style="display:flex; justify-content:space-between; padding-top: 2px;"><span>🪱 铅头钩 (底层跳动)</span><strong style="color:#9b59b6; font-family:monospace;">0.64 m/s</strong></div>
      </div>
    </div>
  </div>
</div>

<div id="col-list">
  <div id="search-box">
    <input type="search" id="search-input" placeholder="🔍 搜寻鱼种...">
    <div class="toolbar-row">
      <button id="clear-btn" onclick="clearChecked()">🧹 清空打勾</button>
      <select id="select-layer" class="toolbar-select" onchange="renderFishList()">
        <option value="">-- 水层 --</option>
        <option value="上层">上层</option>
        <option value="中层">中层</option>
        <option value="下层">下层</option>
      </select>
      <select id="select-bait" class="toolbar-select" onchange="renderFishList()">
        <option value="">-- 饵料 --</option>
        <optgroup label="活饵">
            <option value="藻饵团">藻饵团</option>
            <option value="虫饵">虫饵</option>
            <option value="玉米">玉米</option>
            <option value="谷物">谷物</option>
            <option value="草饵">草饵</option>
            <option value="昆虫">昆虫</option>
            <option value="颗粒">颗粒</option>
            <option value="虾饵">虾饵</option>
            <option value="螺肉">螺肉</option>
            <option value="面饵">面饵</option>
            <option value="活小鱼">活小鱼</option>
            <option value="蟹饵">蟹饵</option>
            <option value="贝类">贝类</option>
        </optgroup>
        <optgroup label="拟饵">
            <option value="水面系">水面系</option>
            <option value="米诺">米诺</option>
            <option value="亮片">亮片</option>
            <option value="摇滚">摇滚</option>
            <option value="软饵">软饵</option>
            <option value="铅头钩">铅头钩</option>
        </optgroup>
      </select>
    </div>
  </div>
  <div id="guild-panel" style="display:none; padding:12px; background:#fff3e0; border-bottom:1px solid #f39c12;"></div>
  <div id="fish-list-container"><div id="fish-list"></div></div>
</div>

<div id="col-chart">
  <canvas id="clockChart"></canvas>
</div>

function toSimplified(str) { return str.split('').map(c => T2S_MAP[c] || c).join(''); }
function tcscMatch(text, keyword) { return !keyword || toSimplified(text.toLowerCase()).includes(toSimplified(keyword.toLowerCase())); }
function getUniqueColor(str) {
  let hash = 0; for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return `hsl(${Math.abs(hash) % 360}, 85%, 45%)`;
}

// 🌟 水層轉換常數 (用於計算相鄰差距)
const LAYER_ORDER = { "表层": 0, "上层": 1, "中层": 2, "下层": 3, "底层": 4 };

// ==============================
// 🌟 核心引擎：即時機率加權運算
// ==============================
function getDynamicWeights(regionName) {
  const selectedLayer = document.getElementById('select-layer').value;
  const selectedBait = document.getElementById('select-bait').value;
  let totalWeightedRatio = 0;
  let weightedFishDict = {};

  if (!REGION_DUMP_DB[regionName]) return { total: 0, dict: {} };

  const allFishInSpot = FISH_DB.filter(f => f.regions.includes(regionName));
  allFishInSpot.forEach(f => {
    const stats = REGION_DUMP_DB[regionName].fishStats[f.name];
    if (stats) {
      // 1. 計算水層加權
      let wLayer = 1.0;
      if (selectedLayer && f.layer) {
        let idx1 = LAYER_ORDER[selectedLayer] !== undefined ? LAYER_ORDER[selectedLayer] : 1;
        let idx2 = LAYER_ORDER[f.layer] !== undefined ? LAYER_ORDER[f.layer] : 1;
        let diff = Math.abs(idx1 - idx2);
        
        if (diff === 0) wLayer = 1.0;          
        else if (diff === 1) wLayer = 0.6;     
        else wLayer = 0.25;                    
      }
      
      // 2. 計算餌料加權
      let wBait = 1.0;
      if (selectedBait) {
        if (f.bait === selectedBait || f.lure === selectedBait) wBait = 1.0; 
        else wBait = 0.55; 
      }
      
      const finalWeightedRatio = stats.ratio * wLayer * wBait;
      weightedFishDict[f.name] = finalWeightedRatio;
      totalWeightedRatio += finalWeightedRatio;
    }
  });

  return { total: totalWeightedRatio, dict: weightedFishDict };
}

// 🌟 雲端資料載入與注入
// ==============================
async function loadAllDatabases() {
  try {
    const tStamp = Date.now();
    const [fishRes, regionRes, dumpRes] = await Promise.all([
      fetch(JSON_URL + '?t=' + tStamp),
      fetch(REGION_URL + '?t=' + tStamp),
      fetch(DUMP_URL + '?t=' + tStamp)
    ]);

    if (!fishRes.ok || !regionRes.ok) throw new Error("雲端伺服器響應異常");

    const fishData = await fishRes.json();
    const regionData = await regionRes.json();
    const dumpData = await dumpRes.json();

    const fishList = Array.isArray(fishData) ? fishData : (fishData.content || []);
    fishList.forEach(item => {
      const details = item.details || {};
      const hoursArray = (details["咬钩时段"] || "").split(/[,、]/).map(t => parseInt(t.trim().split(':')[0])).filter(n => !isNaN(n));
      const regionsArray = (details["分布区域"] || "").split(/[,、]/).map(r => r.trim()).filter(Boolean);
      const bait = details["偏好饵料"] || "";
      const lure = details["偏好拟饵"] || "";

      if (bait) baitSet.add(bait);
      if (lure) lureSet.add(lure);

      FISH_DB.push({
        name: item.name, layer: details["水层"] || "未知", bait: bait, lure: lure,
        hours: hoursArray, regions: regionsArray, rarity: item.rarity || "常见", weight: details["最小重量"] || "未知"
      });
    });

    const rawRegions = regionData.content || [];
    rawRegions.forEach(r => {
      const name = r.region_name;
      const ext = STATIC_REGION_EXT[name] || { castOffset: 0, spots: {} };
      const depthDisplay = r.environment["水层深度"] || r.environment["水深"] || "未知水深";

      const parsedSpots = (r.spots || []).map(s => {
        const spotCastOffset = ext.spots[s.spot_name] !== undefined ? ext.spots[s.spot_name] : 0;
        return { name: s.spot_name, snag: s.snag_risk, castOffset: spotCastOffset };
      });

      SPOT_INFO_DB[name] = {
        depthStr: depthDisplay,
        castOffset: ext.castOffset,
        spots: parsedSpots
      };
    });

    dumpData.forEach(item => {
      if (item.parent && item.parent.fish_pool && item.parent.name) {
        const rName = item.parent.name;
        let totalRatio = 0;
        let fishStats = {};
        
        item.parent.fish_pool.forEach(f => {
          const fName = f.ch_name || f.fish_id; 
          const ratio = f.base_ratio || 0;
          totalRatio += ratio;
          fishStats[fName] = { ratio: ratio, size: f.size_modifier || 1 };
        });
        
        REGION_DUMP_DB[rName] = { totalRatio, fishStats };
      }
    });

    console.log(`✅ 初始化成功！魚類:${FISH_DB.length}筆，地圖:${Object.keys(SPOT_INFO_DB).length}個，深層幾率數據:${Object.keys(REGION_DUMP_DB).length}區`);
    initializeApp();

  } catch(e) {
    console.error("❌ 核心啟提鏈崩潰:", e);
    document.getElementById('fish-list').innerHTML = `<div style="padding:20px; color:red; font-size:12px; background:#fff5f5;">資料庫加載失敗: ${e.message}</div>`;
  }
}

function parseGuildTasks(text) {
  if(!text || !text.trim()) { guildTasks = null; localStorage.removeItem('lazyfisher_guild_tasks'); renderFishList(); return; }
  try {
    let data = JSON.parse(text);
    if(data && data.content && Array.isArray(data.content)) {
      guildTasks = data.content.map(t => ({ fish_name: t.fish_name, reward_price: parseInt((t.reward_price||"0").replace(/,/g, '')), progress: t.progress, status: t.status, category: t.category }));
      localStorage.setItem('lazyfisher_guild_tasks', text); renderFishList();
    }
  } catch(e) { }
}

function updateGuildPanel() {
  const panel = document.getElementById('guild-panel');
  if(!guildTasks || currentTab === '圖鑑查詢') { panel.style.display = 'none'; return; }
  let tasksInSpot = guildTasks.filter(task => { if(task.status === "已交付" || task.status === "已完成") return false; return FISH_DB.some(f => f.name === task.fish_name && f.regions.includes(currentTab)); });
  if(tasksInSpot.length === 0) { panel.style.display = 'none'; return; }
  let html = `<strong style="color:#d35400; display:block; margin-bottom:8px; font-size:12px;">📋 本区任务进度:</strong><div style="display:flex; flex-wrap:wrap; gap:6px;">`;
  tasksInSpot.forEach(t => { html += `<span style="background:${t.category === "高难挑战" ? "#e74c3c" : "#f39c12"}; color:white; padding:3px 8px; border-radius:12px; font-weight:bold; font-size:11px;">${t.fish_name} (${t.progress})</span>`; });
  panel.innerHTML = html + `</div>`; panel.style.display = 'block';
}

function initFilters() {
  // 🌟 修復：重新恢復中欄過濾器的標籤建立與綁定
  const fBait = document.getElementById('tags-bait'), fLure = document.getElementById('tags-lure');
  fBait.innerHTML = ''; fLure.innerHTML = '';

  document.getElementById('search-input').addEventListener('input', renderFishList);

function switchTab(tabName) { 
  currentTab = tabName; currentSlot = null; 
  localStorage.setItem('lazyfisher_current_tab', tabName);
  localStorage.removeItem('lazyfisher_current_slot'); 
  buildContext(); renderFishList(); 
}

function buildContext() {
  buildContextWithoutLoop();
}

function buildContextWithoutLoop() {
  const panel = document.getElementById('spot-context-panel');
  if (currentTab === '圖鑑查詢' || !SPOT_INFO_DB[currentTab]) { panel.style.display = 'none'; return; }
  
  panel.style.display = 'block';
  const region = SPOT_INFO_DB[currentTab];
  
  document.getElementById('spot-title').innerHTML = `<div style="font-size:14px; font-weight:bold; color:var(--text); display:flex; align-items:center;">📍 ${currentTab}</div>`;
  
  const slotC = document.getElementById('slot-buttons-container'); slotC.innerHTML = '';
  (region.spots || []).forEach(s => {
    const btn = document.createElement('span'); btn.className = 'slot-btn'; btn.innerText = s.name;
    btn.onclick = () => { currentSlot = currentSlot === s.name ? null : s.name; localStorage.setItem('lazyfisher_current_slot', currentSlot || ''); buildContext(); };
    if(currentSlot === s.name) btn.classList.add('active');
    slotC.appendChild(btn);
  });
  
  let depthHtml = '';
  if (region.depthStr && region.depthStr.includes('/')) {
    region.depthStr.split('/').forEach(layer => {
      const trimmed = layer.trim();
      if (!trimmed) return;
      let badgeClass = 'b-mid';
      if (trimmed.includes('表层') || trimmed.includes('上层')) badgeClass = 'b-up';
      if (trimmed.includes('底层') || trimmed.includes('下层')) badgeClass = 'b-down';
      
      const namePart = trimmed.match(/^([^\d]+)/)?.[1] || "水层";
      const valPart = trimmed.replace(namePart, '').trim();
      
      let centerStr = '';
      const m = valPart.match(/(\d+(?:\.\d+)?)\s*–\s*(\d+(?:\.\d+)?)/);
      if (m) {
        const minVal = parseFloat(m[1]), maxVal = parseFloat(m[2]);
        const centerVal = (minVal + maxVal) / 2;
        centerStr = ` <span style="color:#7f8c8d; font-size:10px; font-weight:normal;">(中:${centerVal.toFixed(2)}m)</span>`;
      }
      
      depthHtml += `<div class="vert-depth-row"><div><span class="badge ${badgeClass}">${namePart}</span> <b style="font-family:monospace; margin-left:6px; font-size:12px;">${valPart}${centerStr}</b></div></div>`;
    });
  } else {
    depthHtml += `<div class="vert-depth-row"><div><span class="badge b-mid">总水深</span> <b style="font-family:monospace; margin-left:6px; font-size:12px;">${region.depthStr}</b></div></div>`;
  }
  
  let snag = "未选定", spotCastOffset = 0; 
  if(currentSlot && region.spots) { 
    let s = region.spots.find(x => x.name === currentSlot); 
    if(s) { snag = s.snag; spotCastOffset = s.castOffset || 0; }
  }
  
  const totalCastOffset = (region.castOffset || 0) + spotCastOffset;
  let castDisplayHtml = `<span style="color:#8e44ad; font-weight:bold;">📏 總拋偏: <span style="font-family:monospace;">${totalCastOffset > 0 ? '+' : ''}${totalCastOffset.toFixed(1)}m</span></span>`;
  
  document.getElementById('depth-indicator').innerHTML = depthHtml + `
    <div style="border-top:1px dashed #cbd5e1; margin-top:8px; padding-top:6px; display:flex; justify-content:space-between; font-size:11px;">
      ${castDisplayHtml}<span style="color:#d35400; font-weight:bold;">⚠️ 挂底: ${snag}</span>
    </div>`;
}

function renderFishList() {
  // 🌟 修復：恢復中欄過濾器的實際過濾功能
  const L = Array.from(document.querySelectorAll('#tags-layer input:checked')).map(e=>e.value);
  const B = Array.from(document.querySelectorAll('#tags-bait input:checked')).map(e=>e.value);
  const R = Array.from(document.querySelectorAll('#tags-lure input:checked')).map(e=>e.value);
  const K = document.getElementById('search-input').value.trim();
  
  let baseFiltered = FISH_DB.filter(f => (L.length===0 || L.includes(f.layer)) && (B.length===0 || B.includes(f.bait)) && (R.length===0 || R.includes(f.lure)) && tcscMatch(f.name, K));
  
  const allowedRegions = new Set();
  if (checkedFishNames.size > 0) { FISH_DB.forEach(f => { if (checkedFishNames.has(f.name)) f.regions.forEach(r => allowedRegions.add(r)); }); }
  else { baseFiltered.forEach(f => f.regions.forEach(r => allowedRegions.add(r))); }

  if (currentTab !== '圖鑑查詢' && !allowedRegions.has(currentTab)) { currentTab = '圖鑑查詢'; currentSlot = null; localStorage.setItem('lazyfisher_current_tab', '圖鑑查詢'); }
  let filtered = [...baseFiltered]; if (currentTab !== '圖鑑查詢') filtered = filtered.filter(f => f.regions.includes(currentTab));

  let sHtml = `<div class="tab ${currentTab === '圖鑑查詢' ? 'active' : ''}" onclick="switchTab('圖鑑查詢')">📖 全图鉴</div>`;
  const appendMenu = (list, title) => {
    let html = '', count = 0;
    list.forEach(r => {
      if (allowedRegions.has(r)) {
        count++; let tPrice = 0;
        if(guildTasks) guildTasks.forEach(t => { if(t.status !== "已交付" && t.status !== "已完成" && FISH_DB.some(f => f.name === t.fish_name && f.regions.includes(r))) tPrice += t.reward_price; });
        
        html += `<div class="tab ${currentTab === r ? 'active' : ''}" onclick="switchTab('${r}')"><span>${r}</span>${tPrice > 0 ? `<span style="color:#f39c12; font-size:10px; font-weight:bold;">💰${tPrice.toLocaleString()}</span>` : ''}</div>`;
      }
    });
    return count > 0 ? `<div class="section-title">${title} (${count})</div>` + html : '';
  };
  sHtml += appendMenu(REGION_SHORE, "🎣 岸钓") + appendMenu(REGION_BOAT, "🚢 船钓");
  document.getElementById('sidebar-content').innerHTML = sHtml;
  
  buildContextWithoutLoop(); updateGuildPanel();

  if (guildTasks) {
    filtered.sort((a, b) => {
      const tA = guildTasks.find(t => t.fish_name === a.name && t.status !== "已交付" && t.status !== "已完成");
      const tB = guildTasks.find(t => t.fish_name === b.name && t.status !== "已交付" && t.status !== "已完成");
      const isHighA = tA && tA.category === "高难挑战" ? 1 : 0;
      const isHighB = tB && tB.category === "高难挑战" ? 1 : 0;

      if (isHighA !== isHighB) return isHighB - isHighA; 
      const priceA = tA ? tA.reward_price : 0;
      const priceB = tB ? tB.reward_price : 0;
      return priceB - priceA;
    });
  }
  
  let currentSpotDynamicStats = null;
  if (currentTab !== '圖鑑查詢' && REGION_DUMP_DB[currentTab]) {
      currentSpotDynamicStats = getDynamicWeights(currentTab);
  }

  const listC = document.getElementById('fish-list'); listC.innerHTML = '';
  if(filtered.length === 0) listC.innerHTML = '<div style="padding:20px;text-align:center;color:#95a5a6;">无符合条件的鱼种</div>';
  
  filtered.forEach(f => {
    let lc = f.layer==='上层'?'b-up':(f.layer==='中层'?'b-mid':'b-down'), isChecked = checkedFishNames.has(f.name) ? 'checked' : '';
    let t = guildTasks?.find(x => x.fish_name === f.name && x.status !== "已交付" && x.status !== "已完成");
    
    let dumpStatsStr = '';
    if (currentSpotDynamicStats && currentSpotDynamicStats.dict[f.name] !== undefined) {
        const stats = REGION_DUMP_DB[currentTab].fishStats[f.name];
        const weightedRatio = currentSpotDynamicStats.dict[f.name];
        const totalWeightedRatio = currentSpotDynamicStats.total;
        
        let relativeProb = 0;
        if (totalWeightedRatio > 0) {
            relativeProb = (weightedRatio / totalWeightedRatio) * 100;
        }
        
        const isPenalized = weightedRatio < stats.ratio;
        const colorStyle = isPenalized ? 'color:#94a3b8;' : 'color:#10b981; font-weight:bold;';
        
        dumpStatsStr = ` | 📏:${stats.size} | <span style="${colorStyle}">🎲:${relativeProb.toFixed(1)}%</span>`;
    }

    listC.innerHTML += `<label class="fish-item"><input type="checkbox" class="fish-checkbox" value='${JSON.stringify(f)}' onchange="handleCheck(this)" ${isChecked}><div class="fish-info">
        <div class="f-head"><span class="f-name">${f.name}${t ? `<span style="color:#f39c12; font-size:12px; font-weight:bold;">💰${t.reward_price.toLocaleString()}</span>` : ''}</span><span class="tag rarity-${f.rarity}">${f.rarity}</span></div>
        <div class="f-meta">${f.weight} | ${f.hours.join(',')}h${dumpStatsStr}</div>
        <div style="display:flex;gap:3px;flex-wrap:wrap;"><span class="badge ${lc}">${f.layer}</span>${f.bait ? `<span class="badge" style="background:${getUniqueColor(f.bait)}">${f.bait}</span>` : ''}${f.lure ? `<span class="badge" style="background:${getUniqueColor(f.lure)}">${f.lure}</span>` : ''}</div>
      </div></label>`;
  });
  
  // 🌟 修復：確保在最後呼叫，讓右側雷達圖正常顯示
  updateChart();
}

window.handleCheck = function(checkbox) {
  const f = JSON.parse(checkbox.value);
  if (checkbox.checked) checkedFishNames.add(f.name); else checkedFishNames.delete(f.name);
  localStorage.setItem('lazyfisher_checked_fish', JSON.stringify(Array.from(checkedFishNames)));
  renderFishList(); 
}

function clearChecked() { 
  checkedFishNames.clear(); 
  localStorage.removeItem('lazyfisher_checked_fish'); 
  
  // 🌟 修復：清空所有選擇狀態 (下拉選單與核取方塊)
  document.getElementById('select-layer').value = '';
  document.getElementById('select-bait').value = '';
  document.querySelectorAll('.filter-tags input').forEach(i => i.checked = false);
  
  renderFishList(); 
}

function updateClocks() {
  document.getElementById('real-time').innerText = new Date().toTimeString().split(' ')[0];
  let gm = (gameHourOffset * 60 + gameMinuteOffset + Math.floor((Date.now() - gameBaseTime) / 1000)) % 1440; if (gm < 0) gm += 1440;
  const gh = Math.floor(gm / 60); window.currentGameTimeStr = `${String(gh).padStart(2, '0')}:${String(gm % 60).padStart(2, '0')}`;
  document.getElementById('game-time').innerText = window.currentGameTimeStr;
  if (chartInstance) chartInstance.update('none'); 
  if (window.currentGameHour !== gh) { window.currentGameHour = gh; updateChart(); }
}

function calibTime() {
  const h = parseInt(document.getElementById('calib-h').value);
  if (!isNaN(h) && h >= 0 && h < 24) { gameHourOffset = h; gameMinuteOffset = 0; gameBaseTime = Date.now(); localStorage.setItem('lazyfisher_game_hour', h); localStorage.setItem('lazyfisher_base_time', gameBaseTime); }
  updateClocks();
}

const centerTimePlugin = { id: 'centerTime', beforeDraw(chart) { const {ctx, width, height} = chart; ctx.save(); ctx.beginPath(); ctx.arc(width/2, height/2, 45, 0, 2*Math.PI); ctx.fillStyle = "rgba(255,255,255,0.95)"; ctx.fill(); ctx.font = "bold 24px monospace"; ctx.fillStyle = "#ff4757"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(window.currentGameTimeStr, width/2, height/2 + 5); ctx.font = "bold 11px sans-serif"; ctx.fillStyle = "#7f8c8d"; ctx.fillText("游戏时间", width/2, height/2 - 18); ctx.restore(); } };

function updateChart() {
  const dSets = []; let idx = 0;
  FISH_DB.forEach(f => {
    if (checkedFishNames.has(f.name)) {
      const color = getUniqueColor(f.name), hl = new Array(24).fill(null); f.hours.forEach(h => hl[h] = Math.max(0.15, 1.0 - (idx * 0.08))); 
      dSets.push({ label: f.name, data: hl, fill: false, borderColor: color, borderWidth: 4, pointRadius: 3, pointBackgroundColor: color }); idx++;
    }
  });
  const pt = new Array(24).fill(0); pt[window.currentGameHour] = 1.15; dSets.push({ label: '⏰ 游戏时针', data: pt, fill: false, borderColor: 'rgba(255, 71, 87, 0.4)', borderWidth: 2, pointRadius: 5, pointBackgroundColor: '#ff4757', lineTension: 0 });
  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('clockChart');
  if(ctx) { chartInstance = new Chart(ctx.getContext('2d'), { type: 'radar', data: { labels: Array.from({length: 24}, (_, i) => `${i}:00`), datasets: dSets }, plugins: [centerTimePlugin], options: { responsive: true, maintainAspectRatio: false, scales: { r: { min: 0, max: 1.2, ticks: { display: false }, grid: { color: 'rgba(0,0,0,0.06)' }, angleLines: { color: 'rgba(0,0,0,0.06)' }, pointLabels: { font: { size: 12, weight: 'bold' }, color: '#34495e' } } }, plugins: { title: { display: true, text: dSets.length > 1 ? '🎯 时段交集比對中' : '💡 勾选鱼种查看咬口时段' }, legend: { position: 'top', labels: { boxWidth: 10 } } } } }); }
}

function loadSavedData() {
  const savedHour = localStorage.getItem('lazyfisher_game_hour'), savedBaseTime = localStorage.getItem('lazyfisher_base_time');
  if (savedHour !== null && savedBaseTime !== null) { gameHourOffset = parseInt(savedHour); gameBaseTime = parseInt(savedBaseTime); document.getElementById('calib-h').value = savedHour; }
  const savedGuild = localStorage.getItem('lazyfisher_guild_tasks'); if (savedGuild !== null) { document.getElementById('guild-input').value = savedGuild; parseGuildTasks(savedGuild); }
  const savedCheckedFish = localStorage.getItem('lazyfisher_checked_fish'); if (savedCheckedFish !== null) { try { checkedFishNames = new Set(JSON.parse(savedCheckedFish)); } catch(e) { } }
  const savedTab = localStorage.getItem('lazyfisher_current_tab'), savedSlot = localStorage.getItem('lazyfisher_current_slot');
  if (savedTab !== null) { currentTab = savedTab; if (savedSlot !== null) currentSlot = savedSlot; }
}

function initializeApp() {
  loadSavedData(); initFilters(); setInterval(updateClocks, 1000); updateClocks(); renderFishList();
}

loadAllDatabases();
</script>
